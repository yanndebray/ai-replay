<div class="container">
  <div class="controls">

      <button id="btn-play" title="Play / Pause">&#9654;</button>
      <button id="btn-next" title="Next turn">&rarr;</button>
      <a class="bar-title" id="bar-title" title="BLE MCP Demo">BLE MCP Demo</a>
      <span class="progress-text" id="progress-text">0 of 0</span>
      <div class="chapter-wrap" id="chapter-wrap" style="display:none">
        <button id="chapter-btn" title="Chapters">&#9776;</button>
        <div class="chapter-menu" id="chapter-menu"></div>
      </div>
      <div class="controls-secondary">
        <div class="speed-wrap" id="speed-wrap">
          <button id="speed-btn" title="Speed">1x</button>
          <div class="speed-popover" id="speed-popover"></div>
        </div>
        <div class="filter-wrap" id="filter-wrap">
          <button id="filter-btn" title="Filter content"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A.5.5 0 0 1 1.5 2h13a.5.5 0 0 1 .4.8L10 8.7V13.5a.5.5 0 0 1-.7.5l-2.5-1.2a.5.5 0 0 1-.3-.5V8.7L1.1 2.8A.5.5 0 0 1 1 2.5z"/></svg></button>
          <div class="filter-popover">
            <label><input type="checkbox" id="toggle-thinking" checked> Thinking</label>
            <label><input type="checkbox" id="toggle-tools" checked> Tools</label>
          </div>
        </div>
      </div>
      <div class="more-wrap" id="more-wrap">
        <button id="more-btn" title="More">&#x22EE;</button>
        <div class="more-popover" id="more-popover">
          <div class="more-row">
            <span class="more-row-label">Speed</span>
            <button id="speed-btn2" title="Cycle speed">1x</button>
          </div>
          <hr class="more-divider">
          <label><input type="checkbox" id="toggle-thinking2" checked> Thinking</label>
          <label><input type="checkbox" id="toggle-tools2" checked> Tools</label>
          <hr class="more-divider">
          <div id="more-chapters" style="display:none">
            <hr class="more-divider">
            <div id="more-chapter-list"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
        <div class="progress-tooltip" id="progress-tooltip"></div>
      </div>
    </div>
  </div>
  <div id="splash" class="splash">
    <div class="splash-title">BLE MCP Demo</div>
    <button class="splash-play" id="splash-play">&#9654;</button>
  </div>
  <div class="transcript" id="transcript" style="opacity:0.5">Loading...</div>
</div>
