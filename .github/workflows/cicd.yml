name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write  # trusted publishing to npm

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npx --yes oxlint@latest --deny-warnings src/ bin/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: node --test test/test-*.mjs

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "18"
      - run: npm install
      - run: npm run build
      - run: npm pack --dry-run
      - run: npm pack
      - uses: actions/upload-artifact@v5
        with:
          name: package
          path: "*.tgz"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, test-e2e, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: package
      - name: Extract changelog
        if: ${{ !contains(github.ref_name, 'rc') }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## ${VERSION}/{found=1; next} /^## /{if(found) exit} found" CHANGELOG.md > release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.ref_name }}" == *rc* ]]; then
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              --prerelease \
              *.tgz
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes-file release-notes.md \
              *.tgz
          fi

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'rc')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
